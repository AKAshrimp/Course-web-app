spring.application.name=coursewebsite

# H2数据库配置
spring.datasource.url=jdbc:h2:file:./coursewebsite_db
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# 允许从其他主机访问H2控制台
spring.h2.console.settings.web-allow-others=true
# 允许跟踪输出，这有助于调试连接问题
spring.h2.console.settings.trace=true

# JPA配置
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# 日志配置
logging.level.org.hibernate=INFO
logging.level.org.springframework=INFO
# 增加H2和Spring Security的日志级别以便调试
logging.level.org.h2=DEBUG
logging.level.org.springframework.security=DEBUG

# JSP视图配置
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 服务器端口
server.port=8080

# 国际化配置
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.use-code-as-default-message=true

# Actuator配置
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Admin API配置
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174
app.jwt.secret=${JWT_SECRET:local-dev-secret-local-dev-secret-local-dev-secret}
app.jwt.ttl-minutes=${JWT_TTL_MINUTES:120}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
